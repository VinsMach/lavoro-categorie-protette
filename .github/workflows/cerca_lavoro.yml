name: Cerca lavoro categorie protette Lecce

on:
  workflow_dispatch:
  schedule:
    # Ogni giorno alle 07:15 UTC
    - cron: "15 7 * * *"

permissions:
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python cerca_lavoro_categorie_protette.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risultati-cerca-lavoro-lecce
          path: |
            risultati_lecce_v3.txt
            risultati_lecce_v3.json
            risultati_lecce_v3.html
            lavoro_lecce_cp_v3.db
            cerca_lavoro_v3.log
          if-no-files-found: warn
          retention-days: 14
