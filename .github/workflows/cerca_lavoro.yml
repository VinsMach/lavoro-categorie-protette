name: Cerca Lavoro - Categorie Protette Lecce

on:
  schedule:
    - cron: '0 7 * * *'   # ogni giorno alle 08:00 ora italiana
  workflow_dispatch:        # esecuzione manuale dalla tab Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cerca-lavoro:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze
        run: pip install requests feedparser beautifulsoup4 lxml urllib3

      - name: Esegui ricerca e invia su Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cerca_lavoro_categorie_protette.py

      - name: Salva log come artefatto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_id }}
          path: cerca_lavoro.log
          retention-days: 14
        continue-on-error: true
