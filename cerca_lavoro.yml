name: Cerca Lavoro - Categorie Protette Puglia

on:
  # Esegui ogni giorno alle 08:00 ora italiana (07:00 UTC)
  schedule:
    - cron: '0 7 * * *'
  # Permetti esecuzione manuale dalla tab Actions
  workflow_dispatch:

jobs:
  cerca-lavoro:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Scarica il codice del repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installa Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Installa le dipendenze Python
      - name: Installa dipendenze
        run: |
          pip install -r requirements.txt

      # 4. Esegui lo script di ricerca
      - name: Esegui ricerca annunci
        env:
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python cerca_lavoro_categorie_protette.py

      # 5. Salva i risultati come artefatto scaricabile (30 giorni)
      - name: Salva risultati come artefatto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risultati-lavoro-${{ github.run_id }}
          path: |
            risultati_lavoro.txt
            risultati_lavoro.json
            cerca_lavoro.log
          retention-days: 30

      # 6. Aggiorna il database SQLite nel repository (per memoria persistente)
      - name: Aggiorna database nel repository
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add lavoro_categorie_protette.db risultati_lavoro.txt risultati_lavoro.json || true
          git diff --staged --quiet || git commit -m "Aggiornamento automatico $(date '+%d/%m/%Y %H:%M')"
          git push || true
