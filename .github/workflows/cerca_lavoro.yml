name: Cerca Lavoro - Categorie Protette Lecce

on:
  schedule:
    - cron: '0 7 * * *'   # 08:00 ora italiana
  workflow_dispatch:        # esecuzione manuale

jobs:
  cerca-lavoro:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui ricerca annunci
        env:
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          EMAIL_MITTENTE:     ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cerca_lavoro_lecce_v3.py

      # Salva TUTTI i file di output come artefatto scaricabile
      - name: Salva risultati come artefatto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risultati-lecce-${{ github.run_id }}
          path: |
            risultati_lecce.html
            risultati_lecce.txt
            risultati_lecce.json
            cerca_lavoro.log
          retention-days: 60

      # Aggiorna DB e risultati nel repository (memoria persistente)
      - name: Aggiorna DB e risultati nel repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add lavoro_lecce_cp.db risultati_lecce.txt risultati_lecce.json risultati_lecce.html || true
          git diff --staged --quiet || git commit -m "📋 Aggiornamento $(date '+%d/%m/%Y %H:%M')"
          git push || true
